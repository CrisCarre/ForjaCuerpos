<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GYMtrack — Dashboard</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#639922">
<link rel="stylesheet" href="/assets/css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="app-shell">

  <div class="topbar">
    <a href="/index.html" class="icon-btn">←</a>
    <div class="logo">GYM<span>track</span></div>
    <a href="/.netlify/functions/exportar-excel" class="icon-btn icon-btn-green" title="Excel" id="btnExcel">📊</a>
  </div>

  <div class="bottom-nav">
    <a href="/index.html" class="bnav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      <span>Inicio</span>
    </a>
    <a href="/dashboard.html" class="bnav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Progreso</span>
    </a>
    <a href="/nuevo-entreno.html" class="bnav-center">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </a>
    <a href="/.netlify/functions/exportar-excel" class="bnav-item" id="excelNav">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>Excel</span>
    </a>
    <a href="/login.html" class="bnav-item" id="btnLogout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      <span>Salir</span>
    </a>
  </div>

  <div class="dash-body" id="dashBody">
    <div style="text-align:center;padding:3rem;color:var(--text2)">Cargando...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="/assets/js/gymtrack.js"></script>
<script>
(async () => {
  const user = await GT.requireAuth();
  if (!user) return;

  document.getElementById('btnLogout').addEventListener('click', async e => {
    e.preventDefault();
    await GT.sb.auth.signOut();
    window.location.href = '/login.html';
  });

  // Excel con SheetJS
  const excelHandler = (e) => { e.preventDefault(); GT.exportarExcel(); };
  document.getElementById('btnExcel').addEventListener('click', excelHandler);
  document.getElementById('excelNav').addEventListener('click', excelHandler);

  // Cargar todos los entrenos con datos
  const { data: entrenos } = await GT.sb
    .from('entrenos')
    .select('id, nombre, fecha, ejercicios(nombre, series(peso_kg, reps))')
    .eq('usuario_id', user.id)
    .order('fecha', { ascending: false });

  if (!entrenos || !entrenos.length) {
    document.getElementById('dashBody').innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><p>Aún no hay datos.<br>Registra tu primer entreno.</p></div>`;
    return;
  }

  // Stats
  const nombre      = user.user_metadata?.nombre || user.email.split('@')[0];
  const todasSeries = entrenos.flatMap(e => e.ejercicios.flatMap(ej => ej.series));
  const maxPeso     = todasSeries.length ? Math.max(...todasSeries.map(s => s.peso_kg || 0)) : 0;
  const ejDistintos = new Set(entrenos.flatMap(e => e.ejercicios.map(ej => ej.nombre))).size;
  const racha       = GT.calcRacha(entrenos.map(e => e.fecha));

  // Entrenos por semana (últimas 12)
  const semanaMap = {};
  entrenos.forEach(e => {
    const d   = new Date(e.fecha + 'T00:00:00');
    const key = `${d.getFullYear()}-W${String(getWeek(d)).padStart(2,'0')}`;
    if (!semanaMap[key]) semanaMap[key] = { label: d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'}), count: 0 };
    semanaMap[key].count++;
  });
  const semanas = Object.values(semanaMap).slice(0, 12).reverse();

  // Top ejercicios
  const ejCount = {};
  entrenos.forEach(e => e.ejercicios.forEach(ej => {
    if (!ejCount[ej.nombre]) ejCount[ej.nombre] = { veces: 0, maxKg: 0 };
    ejCount[ej.nombre].veces++;
    const m = Math.max(...ej.series.map(s => s.peso_kg || 0));
    if (m > ejCount[ej.nombre].maxKg) ejCount[ej.nombre].maxKg = m;
  }));
  const topEj = Object.entries(ejCount).sort((a,b) => b[1].veces - a[1].veces).slice(0,5);
  const maxVeces = topEj[0]?.[1].veces || 1;

  // Progreso por ejercicio (top 3)
  const top3 = topEj.slice(0,3).map(([nombre]) => nombre);
  const progresoData = {};
  top3.forEach(ejNombre => {
    const pts = entrenos
      .filter(e => e.ejercicios.some(ej => ej.nombre === ejNombre))
      .map(e => {
        const ej = e.ejercicios.find(ej => ej.nombre === ejNombre);
        const max = Math.max(...ej.series.map(s => s.peso_kg || 0));
        return { fecha: e.fecha, max };
      })
      .sort((a,b) => a.fecha.localeCompare(b.fecha))
      .slice(-10);
    progresoData[ejNombre] = pts;
  });

  // Últimos 5
  const ultimos5 = entrenos.slice(0,5);

  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gc = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
  const tc = isDark ? '#8696a0' : '#999';

  document.getElementById('dashBody').innerHTML = `
    <div class="dash-saludo">
      Hola, <strong>${nombre}</strong> 👋
      ${racha >= 2 ? `<span class="racha-badge">🔥 ${racha} días seguidos</span>` : ''}
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Entrenos</div><div class="stat-val">${entrenos.length}</div></div>
      <div class="stat-card"><div class="stat-label">Max peso</div><div class="stat-val">${maxPeso}<span class="stat-unit">kg</span></div></div>
      <div class="stat-card"><div class="stat-label">Ejercicios</div><div class="stat-val">${ejDistintos}</div></div>
      <div class="stat-card"><div class="stat-label">Racha</div><div class="stat-val">${racha}<span class="stat-unit">días</span></div></div>
    </div>

    <div class="section-block">
      <div class="section-block-title">Entrenos por semana</div>
      <div class="chart-wrap"><canvas id="cSem" height="130"></canvas></div>
    </div>

    ${top3.length > 0 ? `
    <div class="section-block">
      <div class="section-block-title">Progreso de peso</div>
      <div class="ej-tabs" id="ejTabs">
        ${top3.map((n,i) => `<button class="ej-tab ${i===0?'active':''}" onclick="switchEj(${i},this)">${n}</button>`).join('')}
      </div>
      ${top3.map((n,i) => `<div class="chart-wrap ej-chart ${i>0?'hidden':''}" id="chart-${i}"><canvas id="cEj${i}" height="140"></canvas></div>`).join('')}
    </div>` : ''}

    <div class="section-block">
      <div class="section-block-title">Tus ejercicios top</div>
      ${topEj.map(([nombre, d], i) => `
        <div class="top-ej-row">
          <div class="top-ej-rank">${i+1}</div>
          <div class="top-ej-info"><div class="top-ej-nombre">${nombre}</div><div class="top-ej-sub">${d.veces} veces · máx ${d.maxKg}kg</div></div>
          <div class="top-ej-bar-wrap"><div class="top-ej-bar" style="width:${Math.round(d.veces/maxVeces*100)}%"></div></div>
        </div>`).join('')}
    </div>

    <div class="section-block">
      <div class="section-block-title">Últimos entrenos</div>
      ${ultimos5.map(e => `
        <a href="/detalle.html?id=${e.id}" class="ultimo-row">
          <div><div class="ultimo-nombre">${e.nombre}</div><div class="ultimo-sub">${e.ejercicios.map(ej=>ej.nombre).join(', ')}</div></div>
          <div class="ultimo-right"><div class="ultimo-fecha">${new Date(e.fecha+'T00:00:00').toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'})}</div></div>
        </a>`).join('')}
    </div>
  `;

  // Gráfica semanas
  new Chart(document.getElementById('cSem'), {
    type: 'bar',
    data: { labels: semanas.map(s=>s.label), datasets: [{ data: semanas.map(s=>s.count), backgroundColor: '#97C459', borderRadius: 4 }] },
    options: { plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: tc, font: { size: 10 }, maxRotation: 0, maxTicksLimit: 6 } }, y: { grid: { color: gc }, ticks: { color: tc, stepSize: 1 } } } }
  });

  // Gráficas progreso
  const colores = ['#639922','#1D9E75','#378ADD'];
  top3.forEach((nombre, i) => {
    const pts = progresoData[nombre];
    new Chart(document.getElementById(`cEj${i}`), {
      type: 'line',
      data: {
        labels: pts.map(p => GT.formatRelativa(p.fecha)),
        datasets: [{ data: pts.map(p=>p.max), borderColor: colores[i], backgroundColor: colores[i]+'20', borderWidth: 2, pointBackgroundColor: colores[i], pointRadius: 4, fill: true, tension: 0.3 }]
      },
      options: { plugins: { legend: { display: false } }, scales: { x: { grid: { color: gc }, ticks: { color: tc, font: { size: 11 } } }, y: { grid: { color: gc }, ticks: { color: tc, font: { size: 11 }, callback: v => v+'kg' } } } }
    });
  });

})();

function switchEj(i, btn) {
  document.querySelectorAll('.ej-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.ej-chart').forEach(c => c.classList.add('hidden'));
  btn.classList.add('active');
  document.getElementById('chart-'+i).classList.remove('hidden');
}

function getWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}
</script>
</body>
</html>
