<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GYMtrack — Acceder</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#639922">
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-logo">GYM<span>track</span></div>
  <p class="auth-sub">Tu historial de entrenos</p>

  <div class="alert alert-error hidden" id="error"></div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn-primary btn-block" id="btnLogin">Entrar</button>
  <p class="auth-link">¿No tienes cuenta? <a href="/registro.html">Regístrate</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/js/gymtrack.js"></script>
<script>
(async () => {
  await GT.requireGuest();

  document.getElementById('btnLogin').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('pass').value;
    const errEl = document.getElementById('error');
    const btn   = document.getElementById('btnLogin');

    if (!email || !pass) { errEl.textContent = 'Rellena todos los campos.'; errEl.classList.remove('hidden'); return; }

    btn.textContent = 'Entrando...'; btn.disabled = true;
    const { error } = await GT.sb.auth.signInWithPassword({ email, password: pass });

    if (error) {
      errEl.textContent = 'Email o contraseña incorrectos.';
      errEl.classList.remove('hidden');
      btn.textContent = 'Entrar'; btn.disabled = false;
    } else {
      window.location.href = '/index.html';
    }
  });

  document.getElementById('pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btnLogin').click();
  });
})();
</script>
</body>
</html>
