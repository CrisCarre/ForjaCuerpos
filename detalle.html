<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GYMtrack — Detalle</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#639922">
<link rel="stylesheet" href="./assets/css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="app-shell">

  <div class="topbar">
    <a href="./index.html" class="icon-btn">←</a>
    <div class="page-title" id="pageTitle">Entreno</div>
    <div class="icon-btn"></div>
  </div>

  <div id="contenido" style="padding-bottom:2rem">
    <div style="text-align:center;padding:3rem;color:var(--text2)">Cargando...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./assets/js/gymtrack.js"></script>
<script>
(async () => {
  const user = await GT.requireAuth();
  if (!user) return;

  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) { window.location.href = './index.html'; return; }

  // Cargar entreno completo
  const { data: entreno, error } = await GT.sb
    .from('entrenos')
    .select(`*, ejercicios(*, series(*))`)
    .eq('id', id)
    .eq('usuario_id', user.id)
    .single();

  if (error || !entreno) { window.location.href = './index.html'; return; }

  document.getElementById('pageTitle').textContent = entreno.nombre;

  // Stats
  const todasSeries = entreno.ejercicios.flatMap(ej => ej.series);
  const maxPeso     = todasSeries.length ? Math.max(...todasSeries.map(s => s.peso_kg || 0)) : 0;
  const totalReps   = todasSeries.reduce((a, s) => a + (s.reps || 0), 0);

  // Progreso del primer ejercicio
  let progresoHTML = '';
  if (entreno.ejercicios.length > 0) {
    const primerEj = entreno.ejercicios[0].nombre;
    const { data: progData } = await GT.sb
      .from('entrenos')
      .select('fecha, ejercicios!inner(nombre, series(peso_kg))')
      .eq('usuario_id', user.id)
      .eq('ejercicios.nombre', primerEj)
      .order('fecha', { ascending: true })
      .limit(12);

    if (progData && progData.length > 1) {
      progresoHTML = `
        <div class="section-block" style="margin:0 1rem 1rem">
          <div class="section-block-title">Progreso — ${primerEj}</div>
          <div class="chart-wrap"><canvas id="graficaProg" height="130"></canvas></div>
        </div>`;
    }

    // Renderizar gráfica tras insertar HTML
    setTimeout(() => {
      if (!progData || progData.length < 2) return;
      const labels = progData.map(e => GT.formatRelativa(e.fecha));
      const pesos  = progData.map(e => Math.max(...(e.ejercicios[0]?.series.map(s => s.peso_kg || 0) || [0])));
      const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const gc = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
      const tc = isDark ? '#8696a0' : '#999';
      new Chart(document.getElementById('graficaProg'), {
        type: 'line',
        data: {
          labels,
          datasets: [{ data: pesos, borderColor: '#639922', backgroundColor: '#63992220', borderWidth: 2, pointBackgroundColor: '#639922', pointRadius: 4, fill: true, tension: 0.3 }]
        },
        options: { plugins: { legend: { display: false } }, scales: { x: { grid: { color: gc }, ticks: { color: tc, font: { size: 11 } } }, y: { grid: { color: gc }, ticks: { color: tc, font: { size: 11 }, callback: v => v + 'kg' } } } }
      });
    }, 100);
  }

  // Render ejercicios
  const ejHTML = entreno.ejercicios.map(ej => {
    const maxKg = ej.series.length ? Math.max(...ej.series.map(s => s.peso_kg || 0)) : 0;
    const seriesHTML = ej.series.map(s => `
      <tr>
        <td class="s-num">${s.numero_serie}</td>
        <td>${s.reps || '—'}</td>
        <td><strong>${s.peso_kg || 0}kg</strong></td>
        <td>
          <div class="s-bar-wrap">
            <div class="s-bar" style="width:${maxKg > 0 ? Math.round((s.peso_kg||0)/maxKg*100) : 0}%"></div>
          </div>
        </td>
      </tr>`).join('');

    return `
      <div class="ej-detalle-card">
        <div class="ej-detalle-header">
          <div>
            <div class="ej-detalle-nombre">${ej.nombre}</div>
            <div class="ej-detalle-cat">${ej.categoria || ''}</div>
          </div>
          <div class="ej-detalle-max">${maxKg}kg max</div>
        </div>
        <table class="series-detalle">
          <thead><tr><th>#</th><th>Reps</th><th>Peso</th><th></th></tr></thead>
          <tbody>${seriesHTML}</tbody>
        </table>
      </div>`;
  }).join('');

  document.getElementById('contenido').innerHTML = `
    ${entreno.foto_portada ? `<div class="detalle-header"><div class="foto-portada"><img src="${entreno.foto_portada}" alt=""></div></div>` : ''}
    <div class="detalle-header">
      <div class="detalle-fecha">${GT.formatFechaLarga(entreno.fecha)}</div>
      ${entreno.notas ? `<div class="detalle-notas">"${entreno.notas}"</div>` : ''}
    </div>

    <div class="stats-grid" style="padding:0 1rem 1rem">
      <div class="stat-card"><div class="stat-label">Ejercicios</div><div class="stat-val">${entreno.ejercicios.length}</div></div>
      <div class="stat-card"><div class="stat-label">Max peso</div><div class="stat-val">${maxPeso}<span class="stat-unit">kg</span></div></div>
      <div class="stat-card"><div class="stat-label">Total reps</div><div class="stat-val">${totalReps}</div></div>
      <div class="stat-card"><div class="stat-label">Series</div><div class="stat-val">${todasSeries.length}</div></div>
    </div>

    ${progresoHTML}

    <div class="section-block" style="margin:0 1rem 1rem">
      <div class="section-block-title">Ejercicios</div>
      ${ejHTML}
    </div>

    <div style="padding:0 1rem 2rem">
      <button class="btn-danger" onclick="eliminar(${entreno.id})">Eliminar este entreno</button>
    </div>
  `;
})();

async function eliminar(id) {
  if (!confirm('¿Eliminar este entreno? No se puede deshacer.')) return;
  const { error } = await GT.sb.from('entrenos').delete().eq('id', id);
  if (!error) window.location.href = './index.html';
  else GT.showToast('Error al eliminar', 'error');
}
</script>
</body>
</html>
