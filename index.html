<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forja-Kuerpo</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#09090b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
  <div class="app-shell">

    <div class="topbar">
      <div class="logo">Forja-<span>Kuerpo</span></div>
      <div class="top-actions">
        <span class="usuario-nombre" id="nombreUsuario"></span>
        <a href="./dashboard.html" class="icon-btn" title="Progreso">📈</a>
        <button class="icon-btn icon-btn-lime" id="btnExcel" title="Excel">📊</button>
        <button class="icon-btn" id="btnLogout" title="Salir">⎋</button>
      </div>
    </div>

    <div class="search-bar">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Buscar entreno o ejercicio...">
    </div>

    <div class="tabs">
      <button class="tab active" data-cat="todos">Todos</button>
      <button class="tab" data-cat="pecho">Pecho</button>
      <button class="tab" data-cat="pierna">Pierna</button>
      <button class="tab" data-cat="espalda">Espalda</button>
      <button class="tab" data-cat="cardio">Cardio</button>
    </div>

    <div class="entrenos-lista" id="lista">
      <div style="text-align:center;padding:3rem;color:var(--text3)">Cargando...</div>
    </div>

    <a href="./entreno-activo.html" class="add-fab" title="Nuevo entreno">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 5v14M5 12h14" />
      </svg>
    </a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="./assets/js/gymtrack.js"></script>
  <script>
    let todosLoEntrenos = [], filtroActivo = 'todos';

    (async () => {
      const user = await GT.requireAuth();
      if (!user) return;

      document.getElementById('nombreUsuario').textContent = user.user_metadata?.nombre || user.email.split('@')[0];
      document.getElementById('btnLogout').addEventListener('click', async () => { await GT.sb.auth.signOut(); window.location.href = './login.html'; });
      document.getElementById('btnExcel').addEventListener('click', () => GT.exportarExcel());

      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          filtroActivo = tab.dataset.cat;
          renderLista();
        });
      });

      document.getElementById('searchInput').addEventListener('input', renderLista);
      await cargarEntrenos(user.id);
    })();

    async function cargarEntrenos(uid) {
      const { data, error } = await GT.sb
        .from('entrenos')
        .select('id, nombre, fecha, foto_portada, ejercicios(nombre, series(peso_kg))')
        .eq('usuario_id', uid)
        .order('fecha', { ascending: false })
        .order('created_at', { ascending: false })
        .limit(100);

      if (error) { document.getElementById('lista').innerHTML = '<div style="padding:2rem;text-align:center;color:var(--red)">Error cargando datos</div>'; return; }

      todosLoEntrenos = (data || []).map(e => {
        const pesos = e.ejercicios.flatMap(ej => ej.series.map(s => s.peso_kg || 0));
        return { ...e, max_peso: pesos.length ? Math.max(...pesos) : 0, _busqueda: (e.nombre + ' ' + e.ejercicios.map(ej => ej.nombre).join(' ')).toLowerCase() };
      });
      renderLista();
    }

    function renderLista() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const lista = document.getElementById('lista');
      let filtrados = todosLoEntrenos.filter(e => {
        const matchCat = filtroActivo === 'todos' || e.nombre.toLowerCase().includes(filtroActivo);
        return matchCat && (!q || e._busqueda.includes(q));
      });

      if (!filtrados.length) {
        lista.innerHTML = `<div class="empty-state"><div class="empty-icon">🏋️</div><p>Aún no tienes entrenos.<br>Pulsa + para registrar el primero.</p></div>`;
        return;
      }

      const grupos = GT.agruparPorFecha(filtrados);
      let html = '';
      for (const [grupo, items] of Object.entries(grupos)) {
        html += `<div class="section-label">${grupo}</div>`;
        for (const e of items) {
          const emoji = GT.getEmoji(e.nombre);
          const color = GT.getBgColor(e.nombre);
          const tiempo = GT.formatRelativa(e.fecha);
          const ejNames = e.ejercicios.map(ej => ej.nombre).join(' · ') || 'Sin ejercicios';
          html += `
        <a href="./detalle.html?id=${e.id}" class="entreno-row">
          <div class="avatar" style="background:${color}">
            ${e.foto_portada ? `<img src="${e.foto_portada}" alt="">` : `<span>${emoji}</span>`}
          </div>
          <div class="info">
            <div class="row1">
              <span class="ej-name">${e.nombre}</span>
              <span class="time">${tiempo}</span>
            </div>
            <div class="row2">
              <span class="preview">${ejNames}</span>
              ${e.max_peso ? `<span class="badge-kg badge-up">${e.max_peso}kg</span>` : ''}
            </div>
          </div>
        </a>
        <div class="separator"></div>`;
        }
      }
      lista.innerHTML = html;
    }
  </script>
</body>

</html>
