<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GYMtrack — Registro</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#639922">
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-logo">GYM<span>track</span></div>
  <p class="auth-sub">Crea tu cuenta gratis</p>

  <div class="alert alert-error hidden" id="error"></div>

  <div class="field">
    <label>Nombre</label>
    <input type="text" id="nombre" placeholder="Tu nombre">
  </div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="tu@email.com">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="pass" placeholder="Mínimo 6 caracteres">
  </div>
  <button class="btn-primary btn-block" id="btnReg">Crear cuenta</button>
  <p class="auth-link">¿Ya tienes cuenta? <a href="/login.html">Acceder</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/js/gymtrack.js"></script>
<script>
(async () => {
  await GT.requireGuest();

  document.getElementById('btnReg').addEventListener('click', async () => {
    const nombre = document.getElementById('nombre').value.trim();
    const email  = document.getElementById('email').value.trim();
    const pass   = document.getElementById('pass').value;
    const errEl  = document.getElementById('error');
    const btn    = document.getElementById('btnReg');

    if (!nombre || !email || pass.length < 6) {
      errEl.textContent = 'Rellena todos los campos. La contraseña debe tener mínimo 6 caracteres.';
      errEl.classList.remove('hidden'); return;
    }

    btn.textContent = 'Creando cuenta...'; btn.disabled = true;

    const { error } = await GT.sb.auth.signUp({
      email, password: pass,
      options: { data: { nombre } }
    });

    if (error) {
      errEl.textContent = error.message === 'User already registered' ? 'El email ya está registrado.' : 'Error al crear la cuenta.';
      errEl.classList.remove('hidden');
      btn.textContent = 'Crear cuenta'; btn.disabled = false;
    } else {
      // Supabase envía email de confirmación, redirigir al login
      window.location.href = '/login.html?registro=ok';
    }
  });
})();
</script>
</body>
</html>
